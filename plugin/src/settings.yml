---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 3.1.0
serverless_language: node
polling_url: https://trmnl.bettens.dev/pokemon-cards/card?pokemon_type={{ pokemon_type | url_encode }}&rarity={{ rarity | url_encode }}&set_id={{ set_id | url_encode }}&language={{ language | url_encode }}
polling_headers: ''
polling_body: ''
id: 297288
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Discover Pokémon cards on your TRMNL — browse packs, hunt for rares, or enjoy the artwork. Filter by type, rarity, or set. A new selection appears each refresh.<br/><br/><strong>Data:</strong> <a href="https://tcgdex.net" target="_blank">TCGdex</a>.
  github_url: https://github.com/ExcuseMi/trmnl-pokemon-cards-plugin
  category: games,art
- keyname: language
  field_type: select
  name: Language
  description: Card language served by TCGdex.
  options:
  - English: en
  - French: fr
  - Spanish: es
  - Italian: it
  - Portuguese (BR): pt-br
  - German: de
  - Japanese: ja
  - Chinese (Traditional): zh-tw
  - Indonesian: id
  - Thai: th
  default: en
  optional: true
- keyname: pokemon_type
  field_type: select
  name: Pokémon Type
  description: Show only cards of a specific type.
  options:
  - Any: any
  - Fire: Fire
  - Water: Water
  - Grass: Grass
  - Lightning: Lightning
  - Psychic: Psychic
  - Fighting: Fighting
  - Darkness: Darkness
  - Metal: Metal
  - Dragon: Dragon
  - Colorless: Colorless
  - Fairy: Fairy
  default: any
  optional: true
- keyname: rarity
  field_type: select
  name: Rarity
  description: Show only cards of a specific rarity. Great for browsing valuable or illustration cards.
  options:
  - Any: any
  - Common: Common
  - Uncommon: Uncommon
  - Rare: Rare
  - Rare Holo: Rare Holo
  - Double Rare: Double Rare
  - Ultra Rare: Ultra Rare
  - Illustration Rare: Illustration Rare
  - Special Illustration Rare: Special Illustration Rare
  default: any
  optional: true
- keyname: set_id
  field_type: xhrSelectSearch
  name: Set
  description: Filter to a specific set. Leave empty to draw from all sets.
  endpoint: https://trmnl.bettens.dev/pokemon-cards/sets
  http_verb: post
  exclude_csrf_token: true
  optional: true
name: Pokémon Cards
refresh_interval: 15
