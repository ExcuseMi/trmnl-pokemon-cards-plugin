---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 
serverless_language: 
polling_url: https://trmnl.bettens.dev/pokemon-cards/card?pokemon_type={{ pokemon_type | url_encode }}&rarity={{ rarity | url_encode }}&set_id={{ set_id | url_encode }}
polling_headers: ''
polling_body: ''
id: 297288
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Display beautiful pokemon cards on your TRMNL. Art Only mode shows just the artwork; Card + Stats shows details. A new selection appears each refresh.<br /><br /><strong>Data:</strong> TCGdex (free, no API key required)
  github_url: https://github.com/ExcuseMi/trmnl-pokemon-cards-plugin
  category: games,art
  help_text: TRMNL X Ready
- keyname: display_mode
  field_type: select
  name: Display Mode
  description: How cards are displayed on screen
  options:
  - Art Only: art
  - Card + Stats: stats
  default: stats
- keyname: pokemon_type
  field_type: select
  name: pokemon Type
  description: Filter by pokemon type
  options:
  - Any: any
  - Fire: Fire
  - Water: Water
  - Grass: Grass
  - Lightning: Lightning
  - Psychic: Psychic
  - Fighting: Fighting
  - Darkness: Darkness
  - Metal: Metal
  - Dragon: Dragon
  - Colorless: Colorless
  - Fairy: Fairy
  default: any
  optional: true
- keyname: rarity
  field_type: select
  name: Rarity
  description: Filter by card rarity
  options:
  - Any: any
  - Common: Common
  - Uncommon: Uncommon
  - Rare: Rare
  - Rare Holo: Rare Holo
  - Double Rare: Double Rare
  - Ultra Rare: Ultra Rare
  - Illustration Rare: Illustration Rare
  - Special Illustration Rare: Special Illustration Rare
  default: any
  optional: true
- keyname: set_id
  field_type: xhrSelectSearch
  name: Set / Series
  description: Search for a set by name. Leave empty for all sets.
  endpoint: https://trmnl.bettens.dev/pokemon-cards/sets
  http_verb: post
  exclude_csrf_token: true
  optional: true
name: Pokemon Cards
refresh_interval: 60
