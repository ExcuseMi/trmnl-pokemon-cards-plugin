# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    plugin_settings:
      instance_name: "Pokémon Cards"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "yes"
      custom_fields_values:
        display_mode: "stats"
        language: "en"
        pokemon_type: "any"
        rarity: "any"
        set_id: ""
  labels:
    artist: Artist
    hp: HP
    type: Type
    stage: Stage
    rarity: Rarity
    retreat: Retreat
    mark: Mark
    print: Print
    cards: Cards
    avg: CM Avg
    avg7: CM 7d
    set: Set
    tcg_market: TCG Mkt
    tcg_low: TCG Low
    released: Released
  items:
    - name: "Charizard"
      hp: "120"
      types_str: "Fire"
      rarity: "Rare Holo"
      set_name: "Base Set"
      set_logo: "https://assets.tcgdex.net/en/base/base1/logo.png"
      image_large: "https://assets.tcgdex.net/en/base/base1/4/high.png"
      image_small: "https://assets.tcgdex.net/en/base/base1/4/low.png"
    - name: "Mew ex"
      hp: "200"
      types_str: "Psychic"
      rarity: "Double Rare"
      set_name: "Obsidian Flames"
      set_logo: "https://assets.tcgdex.net/en/scarlet-violet/sv3/logo.png"
      image_large: "https://assets.tcgdex.net/en/scarlet-violet/sv3/123/high.png"
      image_small: "https://assets.tcgdex.net/en/scarlet-violet/sv3/123/low.png"
    - name: "Pikachu"
      hp: "60"
      types_str: "Lightning"
      rarity: "Common"
      set_name: "Base Set"
      set_logo: "https://assets.tcgdex.net/en/base/base1/logo.png"
      image_large: "https://assets.tcgdex.net/en/base/base1/58/high.png"
      image_small: "https://assets.tcgdex.net/en/base/base1/58/low.png"
    - name: "Rayquaza VMAX"
      hp: "320"
      types_str: "Dragon"
      rarity: "Ultra Rare"
      set_name: "Evolving Skies"
      set_logo: "https://assets.tcgdex.net/en/sword-shield/swsh7/logo.png"
      image_large: "https://assets.tcgdex.net/en/sword-shield/swsh7/217/high.png"
      image_small: "https://assets.tcgdex.net/en/sword-shield/swsh7/217/low.png"
