services:
  backend:
    build: ./backend
    container_name: trmnl-pokemon-cards-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8694}:8080"
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
